<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificat</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, sans-serif;
      background: radial-gradient(circle at top, #f5f7ff, #eef2ff);
      color: #0f172a;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    .wrapper {
      width: 100%;
      max-width: 920px;
    }

    .hero {
      margin-bottom: 18px;
      padding: 6px 4px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: rgba(15, 23, 42, 0.6);
    }

    .card {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    iframe {
      width: 100%;
      height: 72vh;
      border: none;
      display: block;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    a {
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 18px;
      border-radius: 999px;
      transition: all 0.2s ease;
    }

    .primary {
      background: #007aff;
      color: white;
      box-shadow: 0 6px 16px rgba(0, 122, 255, 0.25);
    }

    a:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .badge {
      display: inline-block;
      margin-top: 10px;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(0, 122, 255, 0.08);
      color: #007aff;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <div class="hero">
      <h1 class="title">Certificat d’assistència al Fòrum ISMS</h1>
      <div class="subtitle">Ciberseguretat · Pere Izquierdo Elvira</div>
      <div class="badge">✔ Verificat</div>
    </div>

    <div class="card">
      <iframe src="https://drive.google.com/file/d/1HDM9IS-5beEMjmTRjGDheUwg6JW6TlzR/preview"></iframe>
    </div>

    <div class="actions">
      <a class="primary" href="https://drive.google.com/file/d/1HDM9IS-5beEMjmTRjGDheUwg6JW6TlzR/view" target="_blank">Obrir</a>
    </div>

  </div>

</body>
</html>
