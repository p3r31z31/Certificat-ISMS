<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificat PDF</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    header {
      width: 100%;
      padding: 18px;
      text-align: center;
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(10px);
      font-size: 18px;
      font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .container {
      width: 100%;
      max-width: 1000px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      flex: 1;
      height: 80vh;
      border-radius: 14px;
      overflow: hidden;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    a {
      text-decoration: none;
      color: white;
      background: #3b82f6;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    a:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    .subtitle {
      text-align: center;
      opacity: 0.8;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>📄 Certificat d’assistència al Fòrum ISMS (Ciberseguretat)</header>

  <div class="container">
    <div class="subtitle">Visualitza i descarrega el teu certificat oficial</div>

    <div class="card">
      <!-- IMPORTANT: usar /preview -->
      <iframe src="https://drive.google.com/file/d/1HDM9IS-5beEMjmTRjGDheUwg6JW6TlzR/preview"></iframe>
    </div>

    <div class="btns">
      <a href="https://drive.google.com/file/d/1HDM9IS-5beEMjmTRjGDheUwg6JW6TlzR/view" target="_blank">Obrir a Google Drive</a>
      <a href="https://drive.google.com/file/d/1HDM9IS-5beEMjmTRjGDheUwg6JW6TlzR/view" target="_blank">Baixar certificat</a>
    </div>
  </div>

</body>
</html>
