<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificado PDF</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 16px;
      text-align: center;
      background: #111827;
      font-size: 18px;
      font-weight: bold;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      height: 90vh;
      padding: 16px;
      box-sizing: border-box;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
      background: white;
    }

    .btns {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }

    a {
      color: white;
      text-decoration: none;
      background: #3b82f6;
      padding: 10px 14px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <header>📄 Certificat d'assistencia al fòrum ISMS (ciberseguretat)</header>

  <div class="container">
    <!-- CAMBIA ESTE LINK POR TU PDF DE DRIVE -->
    <iframe src="https://drive.google.com/file/d/ID_DE_TU_PDF/preview"></iframe>

    <div class="btns">
      <a href="https://drive.google.com/file/d/1HDM9IS-5beEMjmTRjGDheUwg6JW6TlzR/view?usp=sharing" target="_blank">Obrir en el Drive</a>
      <a href="https://drive.google.com/file/d/1HDM9IS-5beEMjmTRjGDheUwg6JW6TlzR/view?usp=sharing" download>Baixar certificat</a>
    </div>
  </div>

</body>
</html>
